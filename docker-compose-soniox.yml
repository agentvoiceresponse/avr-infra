services:
  avr-core:
    image: agentvoiceresponse/avr-core
    platform: linux/x86_64
    container_name: avr-core
    restart: always
    environment:
      - PORT=5001 
      - ASR_URL=http://avr-asr-soniox:6018/speech-to-text-stream
      - LLM_URL=http://avr-llm-openai:6002/prompt-stream
      - TTS_URL=http://avr-tts-soniox:6011/text-to-speech-stream
      - INTERRUPT_LISTENING=false
      - SYSTEM_MESSAGE="Hello, how can I help you today?"
    ports:
      - 5001:5001
    networks:
      - avr
      
  avr-asr-soniox:
    image: agentvoiceresponse/avr-asr-soniox
    platform: linux/x86_64
    container_name: avr-asr-soniox
    restart: always
    environment:
      - PORT=6018
      - SONIOX_API_KEY=$SONIOX_API_KEY
      - SONIOX_SPEECH_RECOGNITION_MODEL=stt-rt-v3
      - SONIOX_SPEECH_RECOGNITION_LANGUAGE=en
    networks:
      - avr
  
  avr-tts-soniox:
    image: agentvoiceresponse/avr-tts-soniox
    platform: linux/x86_64
    container_name: avr-tts-soniox
    restart: always
    environment:
      - PORT=6011
      - SONIOX_API_KEY=$SONIOX_API_KEY
      - SONIOX_TTS_MODEL=${SONIOX_TTS_MODEL:-tts-rt-v1}
      - SONIOX_TTS_LANGUAGE=${SONIOX_TTS_LANGUAGE:-en}
      - SONIOX_TTS_VOICE=${SONIOX_TTS_VOICE:-Adrian}
      - SONIOX_TTS_AUDIO_FORMAT=${SONIOX_TTS_AUDIO_FORMAT:-pcm_s16le}
      - SONIOX_TTS_SAMPLE_RATE=${SONIOX_TTS_SAMPLE_RATE:-8000}
    networks:
      - avr

  avr-llm-openai:
    image: agentvoiceresponse/avr-llm-openai
    platform: linux/x86_64
    container_name: avr-llm-openai
    restart: always
    environment:
      - PORT=6002
      - OPENAI_API_KEY=$OPENAI_API_KEY
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-100}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.0}
      - AMI_URL=${AMI_URL:-http://avr-ami:6006}
      - SYSTEM_PROMPT="You are a helpful assistant."
    networks:
      - avr 

  avr-asterisk:
    image: agentvoiceresponse/avr-asterisk
    platform: linux/x86_64
    container_name: avr-asterisk
    restart: always
    ports:
      - 5038:5038
      - 5060:5060
      - 8088:8088
      - 8089:8089
      - 10000-10050:10000-10050/udp
    volumes:
      - ./asterisk/conf/manager.conf:/etc/asterisk/my_manager.conf
      - ./asterisk/conf/pjsip.conf:/etc/asterisk/my_pjsip.conf
      - ./asterisk/conf/extensions.conf:/etc/asterisk/my_extensions.conf
      - ./asterisk/conf/queues.conf:/etc/asterisk/my_queues.conf
      - ./asterisk/conf/ari.conf:/etc/asterisk/my_ari.conf
    networks:
      - avr

  avr-ami:
    image: agentvoiceresponse/avr-ami
    platform: linux/x86_64
    container_name: avr-ami
    restart: always
    environment:
      - PORT=6006
      - AMI_HOST=${AMI_HOST:-avr-asterisk}
      - AMI_PORT=${AMI_PORT:-5038}
      - AMI_USERNAME=${AMI_USERNAME:-avr}
      - AMI_PASSWORD=${AMI_PASSWORD:-avr}
    ports:
      - 6006:6006
    networks:
      - avr

  avr-phone:
    image: agentvoiceresponse/avr-phone
    platform: linux/x86_64
    container_name: avr-phone
    restart: always
    ports:
      - 8080:80
    networks:
      - avr

networks:
  avr:
    name: avr
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
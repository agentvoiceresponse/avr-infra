services:
  avr-core:
    image: agentvoiceresponse/avr-core
    platform: linux/x86_64
    container_name: avr-core
    restart: always
    environment:
      - PORT=5001
      - HTTP_PORT=6001
      - STS_URL=ws://avr-sts-xai:6041
    ports:
      - 5001:5001
    networks:
      - avr

  avr-sts-xai:
    image: agentvoiceresponse/avr-sts-xai
    platform: linux/x86_64
    container_name: avr-sts-xai
    restart: always
    environment:
      - PORT=6041
      - XAI_API_KEY=${XAI_API_KEY}
      - XAI_MODEL=${XAI_MODEL:-grok-voice-latest}
      - XAI_VOICE=${XAI_VOICE:-eve}
      - XAI_INSTRUCTIONS=${XAI_INSTRUCTIONS:-You are a helpful assistant that can answer questions and help with tasks.}
      - XAI_TURN_DETECTION=${XAI_TURN_DETECTION:-server_vad}
      - XAI_WELCOME_MESSAGE=${XAI_WELCOME_MESSAGE:-}
      - AMI_URL=${AMI_URL:-http://avr-ami:6006}
    networks:
      - avr

  avr-asterisk:
    image: agentvoiceresponse/avr-asterisk
    platform: linux/x86_64
    container_name: avr-asterisk
    restart: always
    ports:
      - 5038:5038
      - 5060:5060
      - 8088:8088
      - 8089:8089
      - 10000-10050:10000-10050/udp
    volumes:
      - ./asterisk/conf/manager.conf:/etc/asterisk/my_manager.conf
      - ./asterisk/conf/pjsip.conf:/etc/asterisk/my_pjsip.conf
      - ./asterisk/conf/extensions.conf:/etc/asterisk/my_extensions.conf
      - ./asterisk/conf/queues.conf:/etc/asterisk/my_queues.conf
      - ./asterisk/conf/ari.conf:/etc/asterisk/my_ari.conf
    networks:
      - avr

  avr-ami:
    image: agentvoiceresponse/avr-ami
    platform: linux/x86_64
    container_name: avr-ami
    restart: always
    environment:
      - PORT=6006
      - AMI_HOST=${AMI_HOST:-avr-asterisk}
      - AMI_PORT=${AMI_PORT:-5038}
      - AMI_USERNAME=${AMI_USERNAME:-avr}
      - AMI_PASSWORD=${AMI_PASSWORD:-avr}
    ports:
      - 6006:6006
    networks:
      - avr

  avr-phone:
    image: agentvoiceresponse/avr-phone
    platform: linux/x86_64
    container_name: avr-phone
    restart: always
    ports:
      - 8080:80
    networks:
      - avr

networks:
  avr:
    name: avr
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
